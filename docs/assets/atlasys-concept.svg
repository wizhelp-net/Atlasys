<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Atlasys concept</title>
  <desc id="desc">A conceptual diagram showing inventory JSON and agent guidance becoming a visual system atlas.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8f9ff"/>
      <stop offset="1" stop-color="#eef5ff"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7d17f4"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#1b2440" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="18" markerHeight="18" refX="14" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L14,5 L0,10 z" fill="#5f6f89"/>
    </marker>
    <style>
      .title{font:800 68px Inter,ui-sans-serif,system-ui,sans-serif;fill:#121827}.subtitle{font:500 25px Inter,ui-sans-serif,system-ui,sans-serif;fill:#5f6f89}.label{font:800 20px Inter,ui-sans-serif,system-ui,sans-serif;fill:#121827}.small{font:600 16px Inter,ui-sans-serif,system-ui,sans-serif;fill:#687386}.tiny{font:700 13px Inter,ui-sans-serif,system-ui,sans-serif;fill:#7d17f4;text-transform:uppercase}.code{font:600 18px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#364153}.card{fill:#fff;stroke:#dfe4ee;stroke-width:2;rx:24;filter:url(#shadow)}.node{fill:#fff;stroke:#dfe4ee;stroke-width:2;rx:18;filter:url(#shadow)}.edge{stroke:#5f6f89;stroke-width:4;fill:none;marker-end:url(#arrow)}.softedge{stroke:#a8b2c4;stroke-width:3;fill:none;stroke-dasharray:8 8}.pill{fill:#f0e9ff}.dark{fill:#101827}.green{fill:#f1fff7;stroke:#21a366}.yellow{fill:#fffaf0;stroke:#d6a600}.blue{fill:#eff6ff;stroke:#2563eb}.purpleStroke{stroke:#7d17f4}.white{fill:#fff}.muted{fill:#eef1f6}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1380" cy="120" r="210" fill="#7d17f4" opacity="0.06"/>
  <circle cx="180" cy="780" r="260" fill="#2563eb" opacity="0.06"/>

  <text x="90" y="110" class="title">Atlasys</text>
  <text x="92" y="155" class="subtitle">System cartography for operators and AI agents</text>

  <rect x="90" y="245" width="360" height="400" class="card"/>
  <text x="125" y="295" class="tiny">source of truth</text>
  <text x="125" y="335" class="label">Inventory JSON</text>
  <rect x="125" y="370" width="290" height="215" rx="16" fill="#f7f8fb" stroke="#e5e8ef"/>
  <text x="150" y="415" class="code">systems.json</text>
  <text x="150" y="455" class="code">relationships.json</text>
  <text x="150" y="495" class="code">outcomes.json</text>
  <text x="150" y="535" class="code">views.json</text>
  <rect x="125" y="605" width="126" height="34" rx="17" class="pill"/>
  <text x="145" y="628" class="small" fill="#5c12b2">local-first</text>

  <rect x="530" y="295" width="310" height="300" class="card"/>
  <circle cx="685" cy="390" r="58" fill="url(#purple)"/>
  <text x="652" y="412" font-family="Inter,ui-sans-serif,system-ui" font-size="58" font-weight="900" fill="#fff">◎</text>
  <text x="625" y="485" class="label">Atlasys CLI</text>
  <text x="610" y="522" class="small">validate · render · serve</text>

  <path d="M455 445 C485 445 495 445 525 445" class="edge"/>
  <path d="M845 445 C875 445 885 445 915 445" class="edge"/>

  <rect x="930" y="195" width="580" height="560" class="card"/>
  <text x="975" y="250" class="tiny">visual output</text>
  <text x="975" y="290" class="label">Interactive system atlas</text>

  <g transform="translate(985,345)">
    <rect x="0" y="0" width="170" height="88" class="node purpleStroke"/>
    <text x="22" y="34" class="label" font-size="17">Portal</text>
    <text x="22" y="62" class="small">web-service</text>

    <rect x="310" y="10" width="180" height="88" class="node blue"/>
    <text x="332" y="44" class="label" font-size="17">Backend API</text>
    <text x="332" y="72" class="small">service</text>

    <rect x="150" y="165" width="180" height="88" class="node dark"/>
    <text x="172" y="199" class="label white" font-size="17">App Host</text>
    <text x="172" y="227" class="small" fill="#c7d0e2">host</text>

    <rect x="355" y="178" width="170" height="88" class="node yellow"/>
    <text x="377" y="212" class="label" font-size="17">Tickets</text>
    <text x="377" y="240" class="small">external</text>

    <rect x="8" y="312" width="180" height="88" class="node green"/>
    <text x="30" y="346" class="label" font-size="17">Network</text>
    <text x="30" y="374" class="small">private</text>

    <rect x="285" y="328" width="190" height="88" class="node"/>
    <text x="307" y="362" class="label" font-size="17">Knowledge</text>
    <text x="307" y="390" class="small">corpus</text>

    <path d="M172 45 C225 43 255 47 308 53" class="edge"/>
    <path d="M400 100 C355 132 300 150 258 165" class="edge"/>
    <path d="M400 101 C421 128 431 150 438 178" class="edge"/>
    <path d="M236 253 C190 292 145 306 100 312" class="edge"/>
    <path d="M320 250 C350 285 366 306 379 328" class="edge"/>
  </g>

  <rect x="975" y="675" width="168" height="38" rx="19" fill="#eef1f6"/>
  <text x="1000" y="700" class="small">React Flow</text>
  <rect x="1160" y="675" width="108" height="38" rx="19" fill="#eef1f6"/>
  <text x="1190" y="700" class="small">ELK</text>
  <rect x="1285" y="675" width="168" height="38" rx="19" fill="#eef1f6"/>
  <text x="1318" y="700" class="small">Mermaid</text>

  <text x="90" y="820" class="subtitle">Map what runs where, what talks to what, and which outcomes depend on it.</text>
</svg>
